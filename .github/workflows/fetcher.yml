name: CyberBulletin Automated Intel Fetcher

on:
  schedule:
    # Run twice a day at 06:00 and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allow manual triggering from the GitHub Actions UI

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    
    # CRITICAL: These permissions are required for the bot to push commits back to the repository
    permissions:
      contents: write 

    # Opt-in to Node.js 24 to address deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Fetch all history so rebase can work properly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fetcher Script
        env:
          # Pulls the Groq API Key from your GitHub Repository Secrets
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          # Configure Git as the GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the generated markdown posts and the execution log
          git add docs/ processed.log || true
          
          # Check if there are any changes to commit
          if ! git diff-index --quiet HEAD; then
            echo "New intelligence found! Committing to repository..."
            git commit -m "Automated intel update: $(date +'%Y-%m-%d')"
            
            # CRITICAL: Since multiple actions or humans might have pushed, 
            # we must carefully rebase our local commit on top of the remote main branch.
            git fetch origin main
            git rebase origin/main
            
            git push origin HEAD:main
          else
            echo "No new intel to commit today. Exiting cleanly."
          fi
